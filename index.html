<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM 技術分析報告</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { height:100%; background:#0a0a0a; overflow:hidden; }
        
        .slideshow { width:100%; height:100vh; position:relative; }
        
        .slide { 
            display:none; 
            width:100%; 
            height:100%; 
        }
        
        .slide img { 
            width:100%; 
            height:100%; 
            object-fit: contain;     /* 保持原始比例，不變形 */
        }
        
        .footer {
            position:fixed;
            bottom:0; left:0; right:0;
            background:rgba(0,0,0,0.75);
            color:#ddd;
            text-align:center;
            padding:10px 20px;
            font-size:14px;
            z-index:10;
        }
    </style>
</head>
<body>
    <div class="slideshow">
        <div class="slide" style="display:block;"><img src="images/slide-1.png" alt="1"></div>
        <div class="slide"><img src="images/slide-2.png" alt="2"></div>
        <div class="slide"><img src="images/slide-3.png" alt="3"></div>
        <div class="slide"><img src="images/slide-4.png" alt="4"></div>
        <div class="slide"><img src="images/slide-5.png" alt="5"></div>
    </div>

    <div class="footer">
        ← 上一頁　　→ 下一頁　　｜　按 <strong>F11</strong> 進入全螢幕
    </div>

    <script>
        let current = 0;
        const slides = document.querySelectorAll('.slide');

        function showSlide(n) {
            slides.forEach(s => s.style.display = 'none');
            slides[n].style.display = 'block';
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') {
                current = (current + 1) % 5;
                showSlide(current);
            } else if (e.key === 'ArrowLeft') {
                current = (current - 1 + 5) % 5;
                showSlide(current);
            }
        });

        showSlide(0);
    </script>
</body>
</html>
